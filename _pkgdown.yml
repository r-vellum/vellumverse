url: https://r-vellum.github.io/vellumverse/

template:
  bootstrap: 5
  math-rendering: mathjax
  bslib:
    # A parchment / sepia palette echoing the vellum & vellumplot hex logos.
    bg: "#faf5ea"
    fg: "#2c2113"
    primary: "#6b4f2c"
    secondary: "#8a7350"
    border-radius: "0.5rem"
    navbar-bg: "#efe6d2"
    navbar-light-brand-color: "#4a371f"
    link-color: "#7a5320"
    code-bg: "#f2e9d6"
    base_font: {google: "Spectral"}
    heading_font: {google: "Spectral SC"}
    code_font: {google: "JetBrains Mono"}
  includes:
    in_header: |
      <meta name="theme-color" content="#efe6d2">
  opengraph:
    twitter:
      creator: "@schochastics"
      card: summary_large_image

home:
  title: The vellum graphics ecosystem
  description: >
    vellumverse installs and loads the vellum graphics ecosystem for R
    (vellum, vellumplot, and vellumwidget) in one step, the way the tidyverse bundles
    the data-science packages.
  sidebar:
    structure: [ecosystem, links, license, community, citation, authors, dev]
    components:
      ecosystem:
        title: The ecosystem
        text: >
          [vellum](https://r-vellum.github.io/vellum/) · the parchment
          (backend)<br>
          [vellumplot](https://r-vellum.github.io/vellumplot/) · the pen (grammar)<br>
          [vellumwidget](https://r-vellum.github.io/vellumwidget/) · the vellumwidget
          (interactivity)

navbar:
  structure:
    left: [ecosystem, articles, gallery, reference, news]
    right: [search, vellum, vellumplot, vellumwidget, github]
  components:
    gallery:
      text: Gallery
      href: https://r-vellum.github.io/vellumgallery/
    ecosystem:
      text: Packages
      menu:
      - text: "vellum: low-level graphics backend"
        href: https://r-vellum.github.io/vellum/
      - text: "vellumplot: grammar of graphics"
        href: https://r-vellum.github.io/vellumplot/
      - text: "vellumwidget: interactive widgets"
        href: https://r-vellum.github.io/vellumwidget/
    vellum:
      icon: fa-scroll
      href: https://r-vellum.github.io/vellum/
      aria-label: vellum
    vellumplot:
      icon: fa-feather-pointed
      href: https://r-vellum.github.io/vellumplot/
      aria-label: vellumplot
    vellumwidget:
      icon: fa-highlighter
      href: https://r-vellum.github.io/vellumwidget/
      aria-label: vellumwidget
    github:
      icon: fa-github
      href: https://github.com/r-vellum/vellumverse
      aria-label: GitHub

articles:
- title: Get started
  navbar: ~
  contents:
  - articles/getting-started
  - articles/ecosystem
  - articles/coming-from-ggplot2
- title: Using the ecosystem
  navbar: Using the ecosystem
  contents:
  - articles/one-scene-three-outputs
  - articles/performance
  - articles/extending-the-ecosystem
- title: Background
  navbar: Background
  contents:
  - articles/grid-critique
  - articles/design-principles

reference:
- title: Attaching the ecosystem
  desc: >
    Loading `vellumverse` attaches the core packages. These helpers report
    what was loaded and surface any masked functions.
  contents:
  - vellumverse_packages
  - vellumverse_conflicts
- title: Package
  contents:
  - vellumverse-package

footer:
  structure:
    left: developed_by
    right: built_with

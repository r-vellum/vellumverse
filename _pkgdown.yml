url: https://schochastics.github.io/scriptorium/

template:
  bootstrap: 5
  math-rendering: mathjax
  bslib:
    # A parchment / sepia palette echoing the vellum & quill hex logos.
    bg: "#faf5ea"
    fg: "#2c2113"
    primary: "#6b4f2c"
    secondary: "#8a7350"
    border-radius: "0.5rem"
    navbar-bg: "#efe6d2"
    navbar-light-brand-color: "#4a371f"
    link-color: "#7a5320"
    code-bg: "#f2e9d6"
    base_font: {google: "Spectral"}
    heading_font: {google: "Spectral SC"}
    code_font: {google: "JetBrains Mono"}
  includes:
    in_header: |
      <meta name="theme-color" content="#efe6d2">
  opengraph:
    twitter:
      creator: "@schochastics"
      card: summary_large_image

home:
  title: The vellum graphics ecosystem
  description: >
    scriptorium installs and loads the vellum graphics ecosystem for R —
    vellum, quill, and gloss — in one step, the way the tidyverse bundles
    the data-science packages.
  sidebar:
    structure: [ecosystem, links, license, community, citation, authors, dev]
    components:
      ecosystem:
        title: The ecosystem
        text: >
          [vellum](https://schochastics.github.io/vellum/) · the parchment
          (backend)<br>
          [quill](https://schochastics.github.io/quill/) · the pen (grammar)<br>
          [gloss](https://schochastics.github.io/gloss/) · the gloss
          (interactivity)

navbar:
  structure:
    left: [ecosystem, articles, reference, news]
    right: [search, vellum, quill, gloss, github]
  components:
    ecosystem:
      text: Packages
      menu:
      - text: "vellum — low-level graphics backend"
        href: https://schochastics.github.io/vellum/
      - text: "quill — grammar of graphics"
        href: https://schochastics.github.io/quill/
      - text: "gloss — interactive widgets"
        href: https://schochastics.github.io/gloss/
    vellum:
      icon: fa-scroll
      href: https://schochastics.github.io/vellum/
      aria-label: vellum
    quill:
      icon: fa-feather-pointed
      href: https://schochastics.github.io/quill/
      aria-label: quill
    gloss:
      icon: fa-highlighter
      href: https://schochastics.github.io/gloss/
      aria-label: gloss
    github:
      icon: fa-github
      href: https://github.com/schochastics/scriptorium
      aria-label: GitHub

articles:
- title: Get started
  navbar: ~
  contents:
  - articles/ecosystem

reference:
- title: Attaching the ecosystem
  desc: >
    Loading `scriptorium` attaches the core packages. These helpers report
    what was loaded and surface any masked functions.
  contents:
  - scriptorium_packages
  - scriptorium_conflicts
- title: Package
  contents:
  - scriptorium-package

footer:
  structure:
    left: developed_by
    right: built_with
